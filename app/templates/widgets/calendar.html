<div class="widget widget-calendar">
  <div class="calendar-header">Upcoming</div>
  <table class="calendar-table">
    <tbody>
      {% for ev in events %}
        <tr>
          <td class="cal-when">
            <div class="cal-date">{{ ev.date_label }}</div>
            <div class="cal-time">{{ ev.time_label }}</div>
          </td>
          <td class="cal-summary">{{ ev.summary }}</td>
        </tr>
      {% endfor %}
      {% if not events %}
        <tr>
          <td class="cal-empty" colspan="2">No events</td>
        </tr>
      {% endif %}
    </tbody>
  </table>
</div>
