<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  {{ theme.font_face_css | safe }}
  @page { size: {{ width }}px {{ height }}px; margin: 0; }
  :root {
    --font-family: {{ theme.font_family_css | safe }};
    --font-scale: {{ theme.font_scale }};
    --border: {{ theme.border }};
    --divider: {{ theme.divider }};
    --cell-padding: {{ theme.cell_padding }};
  }
  html, body { margin: 0; padding: 0; width: {{ width }}px; height: {{ height }}px;
               font-family: var(--font-family); color: #000; }
  .zoom-body { width: {{ width }}px; height: {{ body_h }}px;
               padding: 16px; box-sizing: border-box; overflow: hidden; }
  .back-strip { width: {{ width }}px; height: {{ strip_h }}px;
                border-top: 2px solid #000;
                display: flex; align-items: center; justify-content: center;
                font-size: calc(32px * var(--font-scale)); font-weight: 700; }
  /* Dashboard styles widgets may reference. Kept in sync with dashboard.html. */
  .widget { padding: 6px; }
  .widget-clock { text-align: center; }
  .clock-time { font-size: calc(200px * var(--font-scale)); font-weight: 700; line-height: 1; }
  .clock-date { font-size: calc(56px * var(--font-scale)); margin-top: 16px; }
  .widget-weather { display: flex; flex-direction: column; gap: 16px; }
  .weather-now { display: flex; align-items: baseline; gap: 24px; }
  .weather-temp { font-size: calc(140px * var(--font-scale)); font-weight: 700; }
  .weather-label { font-size: calc(44px * var(--font-scale)); }
  .weather-forecast { display: flex; gap: 12px; }
  .weather-day { flex: 1; border: var(--border); padding: 8px; font-size: calc(28px * var(--font-scale)); text-align: center; }
  .weather-day-date { font-weight: 700; }
  .widget-iobroker { text-align: center; }
  .iobroker-label { font-size: calc(36px * var(--font-scale)); }
  .iobroker-value { font-size: calc(120px * var(--font-scale)); font-weight: 700; }
  .widget-calendar { font-size: calc(32px * var(--font-scale)); }
  .calendar-header { font-weight: 700; margin-bottom: 12px; }
  .calendar-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .calendar-table tr { border-bottom: var(--divider); }
  .calendar-table td { padding: 8px 0; vertical-align: top; }
  .cal-when { width: 38%; padding-right: 16px; font-weight: 700; }
  .cal-date, .cal-time { display: block; }
  .cal-time { font-weight: 400; opacity: 0.8; }
  .cal-summary { overflow-wrap: anywhere; }
  .cal-empty { opacity: 0.7; }
  .widget-error { padding: 24px; font-size: calc(32px * var(--font-scale)); }
</style>
</head>
<body>
  <div class="zoom-body">{{ body | safe }}</div>
  <div class="back-strip">&larr; back</div>
</body>
</html>
