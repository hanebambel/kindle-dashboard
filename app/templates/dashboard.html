<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  {{ theme.font_face_css | safe }}
  @page { size: {{ width }}px {{ height }}px; margin: 0; }
  :root {
    --font-family: {{ theme.font_family_css | safe }};
    --font-scale: {{ theme.font_scale }};
    --border: {{ theme.border }};
    --divider: {{ theme.divider }};
    --cell-padding: {{ theme.cell_padding }};
  }
  html, body { margin: 0; padding: 0; width: {{ width }}px; height: {{ height }}px;
               font-family: var(--font-family); color: #000; }
  .dash {
    display: grid;
    width: {{ width }}px;
    height: {{ height }}px;
    grid-template-columns: repeat({{ cols }}, 1fr);
    grid-template-rows: repeat({{ rows }}, 1fr);
    gap: 4px;
    padding: 4px;
    box-sizing: border-box;
  }
  .cell {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: var(--border);
  }
  .widget { flex: 1; padding: calc(var(--cell-padding) + 2px); overflow: hidden; }
  .widget-clock { text-align: center; }
  .clock-time { font-size: calc(64px * var(--font-scale)); font-weight: 700; line-height: 1; }
  .clock-date { font-size: calc(22px * var(--font-scale)); margin-top: 4px; }
  .widget-error { color: #000; font-size: calc(14px * var(--font-scale)); padding: 8px;
                  display: flex; align-items: center; justify-content: center; }
  .widget-weather { display: flex; flex-direction: column; gap: 8px; }
  .weather-now { display: flex; align-items: center; gap: 12px; }
  .weather-icon { flex: 0 0 auto; line-height: 0; }
  .weather-icon svg { width: calc(56px * var(--font-scale)); height: calc(56px * var(--font-scale)); }
  .weather-now-text { display: flex; flex-direction: column; }
  .weather-temp { font-size: calc(48px * var(--font-scale)); font-weight: 700; line-height: 1; }
  .weather-label { font-size: calc(18px * var(--font-scale)); }
  .weather-forecast { display: flex; gap: 8px; }
  .weather-day { flex: 1; border: var(--border); padding: var(--cell-padding); font-size: calc(12px * var(--font-scale)); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .weather-day-icon { line-height: 0; }
  .weather-day-icon svg { width: calc(28px * var(--font-scale)); height: calc(28px * var(--font-scale)); }
  .weather-day-temps { font-weight: 700; }
  .weather-day-date { color: #000; opacity: 0.8; }
  .widget-iobroker { text-align: center; }
  .iobroker-label { font-size: calc(14px * var(--font-scale)); }
  .iobroker-value { font-size: calc(40px * var(--font-scale)); font-weight: 700; }
  .widget.widget-grafana { padding: 0; }
  .widget-grafana { display: flex; align-items: stretch; justify-content: stretch; }
  .widget-grafana img { display: block; }
  .widget-calendar { font-size: calc(14px * var(--font-scale)); }
  .calendar-header { font-weight: 700; margin-bottom: 4px; }
  .calendar-events { list-style: none; padding: 0; margin: 0; }
  .calendar-events li { padding: 2px 0; border-bottom: var(--divider); }
  .cal-when { font-weight: 700; margin-right: 6px; }
</style>
</head>
<body>
<div class="dash">
  {% for item in items %}
    <div class="cell" style="grid-column: {{ item.pos.x + 1 }} / span {{ item.pos.w }};
                              grid-row: {{ item.pos.y + 1 }} / span {{ item.pos.h }};">
      {% if item.error %}
        <div class="widget widget-error">&#9888; {{ item.error }}</div>
      {% else %}
        {{ item.body | safe }}
      {% endif %}
    </div>
  {% endfor %}
</div>
</body>
</html>
