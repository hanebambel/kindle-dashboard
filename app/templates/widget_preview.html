<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; padding: 4px; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; color: #000; background: #fff; }
  .widget { padding: 6px; overflow: hidden; }
  .widget-clock { text-align: center; }
  .clock-time { font-size: 32px; font-weight: 700; line-height: 1; }
  .clock-date { font-size: 14px; margin-top: 4px; }
  .widget-weather { display: flex; flex-direction: column; gap: 4px; }
  .weather-now { display: flex; align-items: baseline; gap: 12px; }
  .weather-temp { font-size: 28px; font-weight: 700; }
  .weather-label { font-size: 13px; }
  .weather-forecast { display: flex; gap: 4px; }
  .weather-day { flex: 1; border: 1px solid #000; padding: 3px; font-size: 10px; text-align: center; }
  .weather-day-date { font-weight: 700; }
  .widget-iobroker { text-align: center; }
  .iobroker-label { font-size: 11px; }
  .iobroker-value { font-size: 24px; font-weight: 700; }
  .widget.widget-grafana { padding: 0; display: flex; }
  .widget-grafana img { display: block; max-width: 100%; height: auto; }
  .widget-calendar { font-size: 11px; }
  .calendar-header { font-weight: 700; margin-bottom: 4px; }
  .calendar-events { list-style: none; padding: 0; margin: 0; }
  .calendar-events li { padding: 2px 0; border-bottom: 1px solid #000; }
  .cal-when { font-weight: 700; margin-right: 6px; }
  .widget-error { color: #000; font-size: 12px; padding: 4px; }
</style>
</head>
<body>
{% if error %}
  <div class="widget widget-error">&#9888; {{ error }}</div>
{% else %}
  {{ body | safe }}
{% endif %}
</body>
</html>
